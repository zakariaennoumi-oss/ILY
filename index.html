<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Proposal 😏💍</title>

<style>
body {
  background: #fff5f7;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  overflow: hidden;
}

.card {
  text-align: center;
}

h1 {
  margin-bottom: 2rem;
}

.buttons {
  position: relative;
  height: 120px;
}

/* YES */
#yesBtn {
  padding: 10px 30px;
  background: #ff4d6d;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
}

/* NO */
#noBtn {
  padding: 10px 25px;
  background: transparent;
  border: 1px solid #aaa;
  position: absolute;
  left: 0;
  top: 0;
  cursor: pointer;
  opacity: 0.5;
}

/* love screen */
#loveScreen {
  display: none;
  font-size: 2rem;
}
</style>
</head>

<body>

<div class="card">
  <div id="proposal">
    <h1 id="title">Will you marry me? 💍</h1>

    <div class="buttons">
      <button id="yesBtn" onclick="sayYes()">Yes 😍</button>
      <button id="noBtn">No 😒</button>
    </div>
  </div>

  <div id="loveScreen">
    💖 I LOVE YOU 💖 <br>
    forever 😭💍✨
  </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const title = document.getElementById("title");

let scale = 1;

const messages = [
  "Are you sure? 😢",
  "Think again 😭",
  "Last chance... 😳",
  "You can't escape 😈",
  "Just click YES 😤",
  "Stop playing 😭",
  "It's destiny 💍"
];

let i = 0;

// NO button runs away
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // change text
  title.textContent = messages[i % messages.length];
  i++;

  // make YES bigger
  scale += 0.2;
  yesBtn.style.transform = `scale(${scale})`;
});

// mobile support
noBtn.addEventListener("touchstart", () => {
  noBtn.dispatchEvent(new Event("mouseover"));
});

// YES click
function sayYes() {
  document.getElementById("proposal").style.display = "none";
  const love = document.getElementById("loveScreen");
  love.style.display = "block";

  // hearts explosion
  for (let i = 0; i < 50; i++) {
    const heart = document.createElement("div");
    heart.textContent = "💖";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = Math.random() * 100 + "vh";
    heart.style.fontSize = "20px";
    heart.style.animation = "float 2s linear forwards";
    document.body.appendChild(heart);
  }
}

// animation
const style = document.createElement("style");
style.innerHTML = `
@keyframes float {
  to {
    transform: translateY(-200px);
    opacity: 0;
  }
}`;
document.head.appendChild(style);

</script>

</body>
</html>
